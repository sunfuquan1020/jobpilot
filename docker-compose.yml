services:
  backend:
    build: ./backend
    ports:
      - "10320:10320"
    volumes:
      - ./backend:/app
    environment:
      - AI_PROVIDER=${AI_PROVIDER:-ollama}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma4:12b}
    command: uvicorn main:app --host 0.0.0.0 --port 10320 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:10320
    depends_on:
      - backend
